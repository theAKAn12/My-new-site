<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Translator Pro</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .mode-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        #toggle-mode {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #toggle-mode:hover { background: var(--primary); color: var(--bg); }

        .display-section {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            min-height: 120px;
            border: 1px solid #334155;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .symbol-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .symbol-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: #fff;
            border-radius: 8px;
            border: 2px solid var(--primary);
        }

        .symbol-label {
            font-size: 0.7rem;
            color: var(--primary);
        }

        .text-output {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: var(--text);
            min-height: 50px;
            word-break: break-all;
        }

        .input-area { margin-top: 25px; }

        #text-input {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1.2rem;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        #text-input:focus { border-color: var(--primary); }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1rem;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .btn-add { background: var(--primary); color: #0f172a; }
        .btn-clear { background: #ef4444; color: white; }
        .btn:active { transform: scale(0.98); }
        
        #file-input { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Visual <span style="color:var(--primary)">Translator</span></h1>
        
        <div class="mode-indicator">
            <span id="label-left" style="font-weight:bold">Symbols</span>
            <button id="toggle-mode" title="Switch Mode">⇅</button>
            <span id="label-right">Meanings</span>
        </div>

        <div class="display-section" id="symbol-display">
            </div>

        <div class="display-section">
            <div id="text-display" class="text-output">READY</div>
        </div>

        <div class="input-area">
            <div id="img-mode-ui">
                <input type="file" id="file-input" accept="image/*" multiple>
                <button class="btn btn-add" onclick="document.getElementById('file-input').click()">+ ADD SYMBOL IMAGES</button>
            </div>

            <div id="txt-mode-ui" class="hidden">
                <input type="text" id="text-input" placeholder="Type letters (e.g., A, GH, 5)..." autocomplete="off">
            </div>

            <button class="btn btn-clear" id="clear-btn">CLEAR ALL</button>
        </div>
    </div>

    <script>
        // Dictionary Mapping based on your data
        const dictionary = {
            "l1.png": "A",  "l2.png": "5",  "l3.png": "L",  "l4.png": "K",
            "l5.png": "3",  "l6.png": "GH", "l7.png": "S",  "l8.png": "ص",
            "l9.png": "ض",  "l10.png": "CH","l11.png": "ط", "l12.png": "T",
            "l13.png": "P",  "l14.png": "9", "l15.png": "V", "l16.png": "M",
            "l17.png": "B",  "l18.png": "D", "l19.png": "N", "l20.png": "R",
            "l21.png": "Y",  "l22.png": "I", "l23.png": "2", "l24.png": "ء",
            "l25.png": "H",  "l26.png": "J", "l27.png": "O", "l28.png": "F",
            "l29.png": "G",  "l30.png": "7", "l31.png": "Z", "l32.png": "W"
        };

        const reverseDict = {};
        for(let key in dictionary) { reverseDict[dictionary[key].toUpperCase()] = key; }

        let isImageMode = true;
        const symbolDisplay = document.getElementById('symbol-display');
        const textDisplay = document.getElementById('text-display');
        const fileInput = document.getElementById('file-input');
        const textInput = document.getElementById('text-input');

        // Mode Toggler
        document.getElementById('toggle-mode').addEventListener('click', () => {
            isImageMode = !isImageMode;
            document.getElementById('img-mode-ui').classList.toggle('hidden');
            document.getElementById('txt-mode-ui').classList.toggle('hidden');
            document.getElementById('label-left').innerText = isImageMode ? "Symbols" : "Meanings";
            document.getElementById('label-right').innerText = isImageMode ? "Meanings" : "Symbols";
            resetAll();
        });

        // --- MODE 1: SYMBOLS TO TEXT ---
        fileInput.addEventListener('change', () => {
            if (textDisplay.innerText === "READY") textDisplay.innerText = "";
            
            Array.from(fileInput.files).forEach(file => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.className = "symbol-img";
                symbolDisplay.appendChild(img);

                const meaning = dictionary[file.name] || "?";
                textDisplay.innerText += meaning;
            });
            fileInput.value = ""; 
        });

        // --- MODE 2: TEXT TO SYMBOLS (Stable Version) ---
        textInput.addEventListener('input', (e) => {
            symbolDisplay.innerHTML = "";
            const val = e.target.value.toUpperCase();
            textDisplay.innerText = val || "READY";

            let i = 0;
            while (i < val.length) {
                let found = false;
                // Check for 2-character symbols first (GH, CH)
                if (i + 1 < val.length && reverseDict[val.substring(i, i+2)]) {
                    createSymbolElement(reverseDict[val.substring(i, i+2)]);
                    i += 2;
                    found = true;
                } 
                // Check for single character symbols
                else if (reverseDict[val[i]]) {
                    createSymbolElement(reverseDict[val[i]]);
                    i++;
                    found = true;
                } else {
                    i++; // Skip unknown
                }
            }
        });

        function createSymbolElement(imageName) {
            const wrapper = document.createElement('div');
            wrapper.className = "symbol-wrapper";
            
            const img = document.createElement('img');
            // IMPORTANT: Make sure images are in the SAME folder as this HTML file
            img.src = imageName; 
            img.className = "symbol-img";
            
            // Error handling if image is missing
            img.onerror = function() {
                this.style.display = "none";
                const errorBox = document.createElement('div');
                errorBox.innerText = "ERROR";
                errorBox.style.color = "red";
                wrapper.appendChild(errorBox);
            };

            wrapper.appendChild(img);
            symbolDisplay.appendChild(wrapper);
        }

        function resetAll() {
            symbolDisplay.innerHTML = "";
            textDisplay.innerText = "READY";
            textInput.value = "";
        }

        document.getElementById('clear-btn').addEventListener('click', resetAll);
    </script>
</body>
</html>
